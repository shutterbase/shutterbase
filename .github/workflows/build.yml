name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  release:
    name: Create release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Changelog
        uses: scottbrenner/generate-changelog-action@master
        id: Changelog
        env:
          REPO: ${{ github.repository }}
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            ${{ steps.Changelog.outputs.changelog }}
          draft: false
          prerelease: false

  test-api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      # /download shells out to exiftool to inject corrected EXIF; the e2e suite
      # exercises that path, so the binary must be on the runner.
      - name: Install exiftool
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl
      - name: Unit tests
        run: cd api && go test ./...
      # testcontainers spins Postgres + rustfs (minio fallback) on the runner's Docker.
      - name: E2E tests
        run: cd api && go test -tags e2e -count=1 -timeout 600s ./test/e2e/...

  test-ui:
    name: UI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      # The SPA imports the WASM module via "image-wasm": "../image-wasm/pkg", so
      # it must be built before `bun install` can resolve the dependency.
      - name: Build WASM
        run: |
          rustup target add wasm32-unknown-unknown
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          cd image-wasm && wasm-pack build --target web --dev
      - name: Install deps
        run: cd ui && bun install --frozen-lockfile
      - name: Vitest
        run: cd ui && bun run test
      - name: Build
        run: cd ui && bun run build

  downloader-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: golang build
        run: cd api && go build -ldflags="-s -w" -o downloader cmd/downloader/main.go

  downloader-release:
    needs:
      - release
      - downloader-build
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        os: [linux, windows, darwin]
        include:
          - os: linux
            artifact_suffix: ""
          - os: windows
            artifact_suffix: ".exe"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
      - name: golang build
        env:
          GOARCH: ${{ matrix.arch }}
          GOOS: ${{ matrix.os }}
        run: cd api && go build -ldflags="-s -w" -o downloader cmd/downloader/main.go
      - name: Upload binaries to release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace }}/api/downloader
          asset_name: shutterbase_downloader_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.artifact_suffix }}
          tag: ${{ github.ref }}

  server:
    name: Server Build
    needs:
      - test-api
      - test-ui
    runs-on: ubuntu-latest
    permissions: write-all
    env:
      DOCKER_IMAGE_URL: ghcr.io/shutterbase/shutterbase
      WASM_BUILDER_IMAGE: ghcr.io/shutterbase/wasm-builder
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: Build
        run: |
          docker pull $WASM_BUILDER_IMAGE:latest
          docker build --platform=linux/amd64 -t $DOCKER_IMAGE_URL:${GITHUB_SHA::8} .
          docker push $DOCKER_IMAGE_URL:${GITHUB_SHA::8}

      - name: Push released image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          docker tag $DOCKER_IMAGE_URL:${GITHUB_SHA::8} $DOCKER_IMAGE_URL:${{ github.ref_name }}
          docker push $DOCKER_IMAGE_URL:${{ github.ref_name }}
